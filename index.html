<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>수박게임</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Jua', sans-serif;
    background: linear-gradient(180deg, #ffe9c7 0%, #ffd9a0 100%);
    display: flex; flex-direction: column; align-items: center;
    overflow: hidden; touch-action: none; user-select: none;
  }
  #topbar {
    width: 100%; max-width: 480px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px 4px; color: #7a4a12;
  }
  .scorebox { text-align: center; line-height: 1.1; }
  .scorebox .label { font-size: 12px; opacity: .7; }
  .scorebox .val { font-size: 26px; }
  #stage { position: relative; flex: 1; width: 100%; max-width: 480px; display: flex; justify-content: center; align-items: flex-start; }
  canvas { display: block; }
  #overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(60, 30, 0, .55);
  }
  #overlay.show { display: flex; }
  #panel {
    background: #fff8e7; border-radius: 16px; padding: 22px 26px;
    width: min(320px, 86%); text-align: center; color: #7a4a12;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
  }
  #panel h2 { font-size: 30px; margin-bottom: 4px; }
  #panel .final { font-size: 18px; margin-bottom: 14px; }
  #panel input {
    font-family: inherit; font-size: 16px; width: 100%;
    padding: 8px 10px; border: 2px solid #e8c78f; border-radius: 10px;
    margin-bottom: 8px; text-align: center; background: #fff;
  }
  #panel button {
    font-family: inherit; font-size: 16px; cursor: pointer;
    padding: 9px 18px; border: none; border-radius: 10px;
    background: #e0533d; color: #fff; margin: 3px;
  }
  #panel button.sub { background: #58a05c; }
  #panel button:disabled { opacity: .5; }
  #ranking { margin-top: 12px; text-align: left; font-size: 14px; max-height: 180px; overflow-y: auto; }
  #ranking .row { display: flex; justify-content: space-between; padding: 3px 6px; border-radius: 6px; }
  #ranking .row:nth-child(odd) { background: #f7ecd4; }
  #ranking .me { background: #ffd88a !important; }
  #lbmsg { font-size: 12px; opacity: .7; margin-top: 8px; }
</style>
</head>
<body>
<div id="topbar">
  <div class="scorebox"><div class="label">점수</div><div class="val" id="score">0</div></div>
  <div class="scorebox"><div class="label">최고</div><div class="val" id="best">0</div></div>
</div>
<div id="stage">
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="panel">
      <h2 id="ovTitle">게임 오버</h2>
      <div class="final" id="ovScore"></div>
      <div id="lbArea">
        <input id="nick" maxlength="12" placeholder="닉네임 (최대 12자)">
        <button class="sub" id="submitBtn">랭킹 등록</button>
      </div>
      <button id="restartBtn">다시 하기</button>
      <div id="ranking"></div>
      <div id="lbmsg"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
<script>
(() => {
  // ===== Supabase 설정 — 2048 때와 동일 패턴. 아래 두 값만 채우면 리더보드 활성화 =====
  const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
  const SUPABASE_KEY = 'YOUR_PUBLISHABLE_KEY';
  const LB_TABLE = 'suika_rankings';
  const LB_ENABLED = !SUPABASE_URL.includes('YOUR-PROJECT');

  const { Engine, Bodies, Body, World, Events } = Matter;

  // ===== 보드/과일 상수 =====
  // 캔버스가 화면을 꽉 채우도록 화면 비율에 맞춰 논리 높이를 결정.
  // 그래야 박스(가운데 1/3)가 '실제 화면 폭의 1/3'이 됨.
  const stageEl = document.getElementById('stage');
  const W = 561;                                     // 논리 폭 (박스 = 정확히 W/3)
  const ASPECT = stageEl.clientHeight / Math.max(1, stageEl.clientWidth);
  const H = Math.min(1500, Math.max(680, Math.round(W * ASPECT)));
  const BX1 = W * 2 / 3;                             // 오른쪽 벽면 유지 (우측 열 보존)
  const BX0 = BX1 - 280;                             // 왼쪽 여백을 써서 폭 1.5배 (187 → 280)
  const BOARD_TOP = 130;
  const BOX_H = Math.min(645, H - BOARD_TOP - 30);   // 높이도 1.5배 (430 → 645), 화면 여유 내에서
  const BOARD_BOT = BOARD_TOP + BOX_H;
  const WALL = 14;
  const DEADLINE = BOARD_TOP + 80;    // 게임오버 라인 y
  const DROP_Y = BOARD_TOP - 60;      // 드롭 대기 높이 (박스 위 공간)
  const FRUITS = [
    { name: '체리',     emoji: '🍒', r: 12 },
    { name: '딸기',     emoji: '🍓', r: 15 },
    { name: '포도',     emoji: '🍇', r: 18 },
    { name: '귤',       emoji: '🍊', r: 23 },
    { name: '감',       emoji: '🍅', r: 27 },
    { name: '사과',     emoji: '🍎', r: 33 },
    { name: '배',       emoji: '🍐', r: 41 },
    { name: '복숭아',   emoji: '🍑', r: 50 },
    { name: '파인애플', emoji: '🍍', r: 60 },
    { name: '멜론',     emoji: '🍈', r: 74 },
    { name: '수박',     emoji: '🍉', r: 90 },
  ];
  const MAX_LEVEL = FRUITS.length - 1;
  const DROPPABLE = 5;                                  // 1~5단계만 드롭 등장
  const mergeScore = lv => lv * (lv + 1) / 2;           // 삼각수: 결과 단계 lv 생성 시 점수
  const WATERMELON_BONUS = 100;

  // ===== 이모지 글리프 측정 (피하기 게임과 동일 방식: 오프스크린 알파 스캔) =====
  // 이모지마다 그림이 차지하는 영역이 달라(🍍 세로로 길쭉, 🍑 꽉 참) 고정 배율로 그리면
  // 겹쳐 보이거나(#3) 후순위 과일이 작아 보이는(#5) 문제 발생 → 과일별 자동 보정
  function measureGlyph(emoji) {
    const S = 120, C = Math.round(S * 1.7);
    const c = document.createElement('canvas');
    c.width = c.height = C;
    const g = c.getContext('2d', { willReadFrequently: true });
    g.font = `${S}px serif`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(emoji, C / 2, C / 2);
    const d = g.getImageData(0, 0, C, C).data;
    let minX = C, minY = C, maxX = -1, maxY = -1;
    for (let y = 0; y < C; y++) for (let x = 0; x < C; x++) {
      if (d[(y * C + x) * 4 + 3] > 10) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
    if (maxX < 0) return { w: 0.95, h: 0.95, cx: 0, cy: 0.04 };   // 측정 실패 폴백
    return {
      w: (maxX - minX + 1) / S,
      h: (maxY - minY + 1) / S,
      cx: ((minX + maxX) / 2 - C / 2) / S,      // 글리프 중심의 오프셋 (font 크기 비율)
      cy: ((minY + maxY) / 2 - C / 2) / S,
    };
  }
  const GLYPH = FRUITS.map(f => measureGlyph(f.emoji));

  // 물리 원과 시각 크기를 일치시키는 공용 드로잉: 면적 기준(기하평균)으로 맞추고
  // 0.96배 여유를 둬서 맞닿아도 겹쳐 보이지 않게(#3)
  // opts: { scale, mood, look, blink } — 표정/역동성(#2)
  function drawEmoji(lv, x, y, r, angle, opts) {
    const o = opts || {};
    const g = GLYPH[lv];
    const fontPx = (2 * r * 0.96) / Math.sqrt(g.w * g.h);
    ctx.save();
    ctx.translate(x, y);
    if (angle) ctx.rotate(angle);
    if (o.scale && o.scale !== 1) ctx.scale(o.scale, 1 / o.scale);   // 스쿼시&스트레치
    ctx.font = `${fontPx}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(FRUITS[lv].emoji, -g.cx * fontPx, -g.cy * fontPx);
    drawFace(r, o);
    ctx.restore();
  }

  // 표정 — 중립(웃음) / 합체 직후(기쁨) / 데드라인 근처(당황)
  function drawFace(r, o) {
    const ex = r * 0.34, ey = -r * 0.10;
    const er = Math.max(2.4, r * 0.16);
    const mood = o.mood || 'calm';
    const look = o.look || 0;                       // 속도에 따른 눈동자 쏠림 (-1~1)
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if (o.blink) {                                  // 깜빡임
      ctx.strokeStyle = '#3a2410';
      ctx.lineWidth = Math.max(1.4, r * 0.075);
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(s * ex - er * 0.8, ey);
        ctx.lineTo(s * ex + er * 0.8, ey);
        ctx.stroke();
      }
    } else if (mood === 'happy') {                  // ^ ^
      ctx.strokeStyle = '#3a2410';
      ctx.lineWidth = Math.max(1.4, r * 0.085);
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(s * ex - er * 0.85, ey + er * 0.5);
        ctx.lineTo(s * ex, ey - er * 0.55);
        ctx.lineTo(s * ex + er * 0.85, ey + er * 0.5);
        ctx.stroke();
      }
    } else {
      const wide = mood === 'panic' ? 1.28 : 1;
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.ellipse(s * ex, ey, er * wide, er * 1.12 * wide, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#fffdf7';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s * ex + look * er * 0.4, ey + er * 0.12, er * 0.5, 0, Math.PI * 2);
        ctx.fillStyle = '#3a2410';
        ctx.fill();
      }
    }

    // 입
    ctx.strokeStyle = '#3a2410';
    ctx.lineWidth = Math.max(1.3, r * 0.07);
    ctx.beginPath();
    if (mood === 'panic') {
      ctx.ellipse(0, r * 0.33, r * 0.13, r * 0.17, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#3a2410';
      ctx.fill();
    } else if (mood === 'happy') {
      ctx.arc(0, r * 0.20, r * 0.24, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();
    } else {
      ctx.arc(0, r * 0.20, r * 0.18, 0.2 * Math.PI, 0.8 * Math.PI);
      ctx.stroke();
    }

    // 볼터치 — 기쁨일 때만
    if (mood === 'happy' && r > 16) {
      ctx.fillStyle = 'rgba(240,110,110,.35)';
      for (const s of [-1, 1]) {
        ctx.beginPath();
        ctx.ellipse(s * r * 0.55, r * 0.16, r * 0.13, r * 0.09, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // 과일 몸체의 표정/애니메이션 상태 계산
  function fruitOpts(body) {
    const now = performance.now();
    const r = FRUITS[body.level].r;
    const pop = Math.max(0, 1 - (now - body.popAt) / 260);
    const danger = body.position.y - r < DEADLINE + r * 0.6;
    return {
      scale: 1 + 0.22 * Math.sin(pop * Math.PI),
      mood: pop > 0.15 ? 'happy' : (danger ? 'panic' : 'calm'),
      look: Math.max(-1, Math.min(1, body.velocity.x / 4)),
      blink: ((now + body.blinkPhase) % 3600) < 130,
    };
  }

  // ===== 캔버스 =====
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;
  function layout() {
    const stage = document.getElementById('stage');
    const s = Math.min(stage.clientWidth / W, stage.clientHeight / H);
    canvas.style.width = W * s + 'px';
    canvas.style.height = H * s + 'px';
  }
  window.addEventListener('resize', layout);

  // ===== 물리 세계 =====
  const engine = Engine.create();
  const world = engine.world;
  engine.gravity.y = 1.1;
  engine.positionIterations = 12;     // 실제 파고듦(겹침)도 줄임(#3)
  engine.velocityIterations = 8;
  const wallOpt = { isStatic: true, friction: 0.4, render: {} };
  World.add(world, [
    Bodies.rectangle((BX0 + BX1) / 2, BOARD_BOT + 40, (BX1 - BX0) + 200, 80, wallOpt),     // 바닥면 = BOARD_BOT
    Bodies.rectangle(BX0 - 40, H / 2, 80, H * 2, wallOpt),                                 // 왼벽면 = BX0
    Bodies.rectangle(BX1 + 40, H / 2, 80, H * 2, wallOpt),                                 // 오른벽면 = BX1
  ]);

  // ===== 상태 =====
  let score = 0, best = 0, over = false;
  let currentLv = 0, nextLv = 0;
  let aimX = (BX0 + BX1) / 2;
  let canDrop = true;
  let overTimer = 0;
  let lastTime = 0;
  let effects = [];

  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');

  let memBest = 0;
  function loadBest() {
    try { best = parseInt(localStorage.getItem('suika_best') || '0', 10); }
    catch { best = memBest; }
    bestEl.textContent = best;
  }
  function saveBest() {
    if (score <= best) return;
    best = score; bestEl.textContent = best;
    try { localStorage.setItem('suika_best', String(best)); } catch { memBest = best; }
  }

  // ===== 과일 생성 =====
  function spawnFruit(x, y, lv, fromMerge) {
    const body = Bodies.circle(x, y, FRUITS[lv].r, {
      restitution: 0.15, friction: 0.4, density: 0.0012,
      label: 'fruit',
    });
    body.level = lv;
    body.merged = false;
    body.bornAt = performance.now();
    body.popAt = fromMerge ? performance.now() : -1e9;
    body.blinkPhase = Math.random() * 3600;
    body.touched = fromMerge;
    World.add(world, body);
    return body;
  }

  function pickNext() { return Math.floor(Math.random() * DROPPABLE); }

  function drop() {
    if (!canDrop || over) return;
    const r = FRUITS[currentLv].r;
    const x = Math.max(BX0 + r, Math.min(BX1 - r, aimX));
    spawnFruit(x, DROP_Y, currentLv, false);
    currentLv = nextLv;
    nextLv = pickNext();
    canDrop = false;
    setTimeout(() => { canDrop = true; }, 550);
  }

  // ===== 합체 =====
  Events.on(engine, 'collisionStart', e => {
    for (const pair of e.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      if (a.label === 'fruit') a.touched = true;
      if (b.label === 'fruit') b.touched = true;
      if (a.label !== 'fruit' || b.label !== 'fruit') continue;
      if (a.level !== b.level) continue;
      if (a.merged || b.merged) continue;         // 함정①: 한 프레임 3개 충돌 이중합체 방지
      if (a.level === MAX_LEVEL) continue;        // 수박끼리는 합체 없음
      a.merged = b.merged = true;
      const nl = a.level + 1;
      const mx = (a.position.x + b.position.x) / 2;
      const my = (a.position.y + b.position.y) / 2;
      World.remove(world, a); World.remove(world, b);
      spawnFruit(mx, my, nl, true);
      score += mergeScore(nl);
      if (nl === MAX_LEVEL) score += WATERMELON_BONUS;
      scoreEl.textContent = score;
      effects.push({ x: mx, y: my, r: FRUITS[nl].r, t: 0, pts: mergeScore(nl) + (nl === MAX_LEVEL ? WATERMELON_BONUS : 0) });
    }
  });

  // ===== 게임오버 판정 (함정②: 라인 위 '체류 시간'으로 판정) =====
  function checkGameOver(dt) {
    const now = performance.now();
    let danger = false;
    for (const body of world.bodies) {
      if (body.label !== 'fruit') continue;
      if (!body.touched) continue;
      if (now - body.bornAt < 800) continue;
      if (body.position.y - FRUITS[body.level].r < DEADLINE) { danger = true; break; }
    }
    overTimer = danger ? overTimer + dt : 0;
    if (overTimer > 1000) gameOver();
    return danger;
  }

  function gameOver() {
    over = true;
    saveBest();
    document.getElementById('ovScore').textContent = `최종 점수 ${score}점` + (score >= best ? ' — 최고 기록!' : '');
    document.getElementById('overlay').classList.add('show');
    document.getElementById('submitBtn').disabled = !LB_ENABLED;
    document.getElementById('lbmsg').textContent = LB_ENABLED ? '' : '리더보드 비활성 — 파일 상단 SUPABASE 설정을 채워주세요';
    if (LB_ENABLED) loadRanking();
  }

  function restart() {
    for (const body of [...world.bodies]) if (body.label === 'fruit') World.remove(world, body);
    score = 0; over = false; overTimer = 0; effects = [];
    currentLv = pickNext(); nextLv = pickNext();
    scoreEl.textContent = 0;
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('submitBtn').disabled = false;
  }

  // ===== 렌더링 =====
  function drawNextBox() {
    // 다음 과일 — 박스 옆 오른쪽, 실제 플레이 크기 그대로(#4)
    const cx = (BX1 + W) / 2, cy = BOARD_TOP + 90;
    ctx.fillStyle = '#a8834e';
    ctx.font = '16px Jua, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('다음', cx, BOARD_TOP + 30);
    ctx.strokeStyle = '#d8b985';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.arc(cx, cy, 42, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
    drawEmoji(nextLv, cx, cy, FRUITS[nextLv].r, 0, { mood: 'happy' });
  }

  function drawEvoRing() {
    // 진화의 고리 — 우측 열, '다음' 아래(#4)
    const R = 54;
    const cx = (BX1 + W) / 2;
    const cy = Math.min(H - R - 32, BOARD_TOP + 250);   // 다음 과일(하단 BOARD_TOP+132)과 겹치지 않게
    ctx.beginPath();
    ctx.arc(cx, cy, R + 28, 0, Math.PI * 2);
    ctx.fillStyle = '#fff3da';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = '#d8b985';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    FRUITS.forEach((f, i) => {
      const ang = -Math.PI / 2 + (i / FRUITS.length) * Math.PI * 2;
      ctx.font = `${13 + i * 1.4}px serif`;
      ctx.fillText(f.emoji, cx + Math.cos(ang) * R, cy + Math.sin(ang) * R);
    });
    ctx.fillStyle = '#a8834e';
    ctx.font = '14px Jua, sans-serif';
    ctx.fillText('진화의 고리', cx, cy);
  }

  function render(danger) {
    // 박스 바깥 영역
    ctx.fillStyle = '#ffe4b8';
    ctx.fillRect(0, 0, W, H);
    // 박스 내부
    ctx.fillStyle = '#fff8e7';
    ctx.fillRect(BX0, BOARD_TOP, BX1 - BX0, BOARD_BOT - BOARD_TOP);
    // 벽
    ctx.fillStyle = '#c98d4b';
    ctx.fillRect(BX0 - WALL, BOARD_TOP, WALL, BOARD_BOT - BOARD_TOP + WALL);
    ctx.fillRect(BX1, BOARD_TOP, WALL, BOARD_BOT - BOARD_TOP + WALL);
    ctx.fillRect(BX0 - WALL, BOARD_BOT, BX1 - BX0 + WALL * 2, WALL);
    // 데드라인
    ctx.strokeStyle = danger ? 'rgba(224,60,40,.9)' : 'rgba(224,60,40,.35)';
    ctx.lineWidth = danger ? 5 : 3;
    ctx.setLineDash([14, 10]);
    ctx.beginPath();
    ctx.moveTo(BX0, DEADLINE); ctx.lineTo(BX1, DEADLINE);
    ctx.stroke();
    ctx.setLineDash([]);

    drawNextBox();
    drawEvoRing();

    // 조준선 + 대기 과일
    if (!over) {
      const f = FRUITS[currentLv];
      const x = Math.max(BX0 + f.r, Math.min(BX1 - f.r, aimX));
      ctx.strokeStyle = 'rgba(122,74,18,.2)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, DROP_Y); ctx.lineTo(x, BOARD_BOT);
      ctx.stroke();
      ctx.globalAlpha = canDrop ? 1 : 0.45;
      drawEmoji(currentLv, x, DROP_Y, f.r, 0, { mood: 'calm', look: 0 });
      ctx.globalAlpha = 1;
    }

    // 과일 (함정③: body 각도 적용해 회전 표현)
    for (const body of world.bodies) {
      if (body.label === 'fruit') drawEmoji(body.level, body.position.x, body.position.y, FRUITS[body.level].r, body.angle, fruitOpts(body));
    }

    // 합체 이펙트
    for (const fx of effects) {
      const p = fx.t / 400;
      ctx.globalAlpha = 1 - p;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 6 * (1 - p);
      ctx.beginPath();
      ctx.arc(fx.x, fx.y, fx.r * (0.6 + p * 0.8), 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#7a4a12';
      ctx.font = '22px Jua, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`+${fx.pts}`, fx.x, fx.y - fx.r - 8 - p * 22);
      ctx.globalAlpha = 1;
    }
  }

  // ===== 메인 루프 =====
  function loop(t) {
    const dt = Math.min(32, t - lastTime || 16);
    lastTime = t;
    if (!over) Engine.update(engine, dt);
    effects = effects.filter(fx => (fx.t += dt) < 400);
    const danger = over ? false : checkGameOver(dt);
    render(danger);
    requestAnimationFrame(loop);
  }

  // ===== 입력 =====
  function toGameX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) / rect.width * W;
  }
  canvas.addEventListener('pointerdown', e => { aimX = toGameX(e.clientX); });
  canvas.addEventListener('pointermove', e => { aimX = toGameX(e.clientX); });
  canvas.addEventListener('pointerup', e => { aimX = toGameX(e.clientX); drop(); });

  // ===== 리더보드 (Supabase REST — 피하기 게임과 동일 패턴) =====
  const sbHeaders = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
  };
  let submittedName = null;
  async function loadRanking() {
    const el = document.getElementById('ranking');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${LB_TABLE}?select=name,score&order=score.desc,id.asc&limit=10`, { headers: sbHeaders });
      const rows = await res.json();
      el.innerHTML = rows.map((r, i) =>
        `<div class="row${r.name === submittedName ? ' me' : ''}"><span>${i + 1}. ${escapeHtml(r.name)}</span><span>${r.score}점</span></div>`
      ).join('') || '<div class="row">아직 기록이 없어요</div>';
    } catch {
      el.innerHTML = '<div class="row">랭킹을 불러오지 못했어요</div>';
    }
  }
  async function submitScore() {
    const name = document.getElementById('nick').value.trim();
    if (!name) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/${LB_TABLE}`, {
        method: 'POST', headers: sbHeaders,
        body: JSON.stringify({ name, score }),
      });
      submittedName = name;
      document.getElementById('lbmsg').textContent = '등록 완료!';
      loadRanking();
    } catch {
      document.getElementById('lbmsg').textContent = '등록 실패 — 네트워크를 확인해주세요';
      btn.disabled = false;
    }
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  document.getElementById('submitBtn').addEventListener('click', submitScore);
  document.getElementById('restartBtn').addEventListener('click', restart);

  // ===== 시작 =====
  layout();
  loadBest();
  currentLv = pickNext(); nextLv = pickNext();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
